<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Support Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --panel-bg: rgba(17, 24, 39, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --user-msg-bg: linear-gradient(135deg, #2563eb, #1d4ed8);
      --bot-msg-bg: rgba(31, 41, 55, 0.8);
      --accent-color: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top right, #1e293b, var(--bg-color));
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 850px;
      height: 90vh;
      max-height: 750px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 23, 42, 0.4);
    }

    .header-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #ffffff;
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
    }

    .status-container {
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .status {
      font-size: 12px;
      color: var(--accent-color);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: var(--accent-color);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-color);
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* Message Bubbles */
    .msg-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msg-wrapper.user-msg {
      align-self: flex-end;
    }

    .msg-wrapper.bot-msg {
      align-self: flex-start;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      position: relative;
    }

    .user-msg .msg {
      background: var(--user-msg-bg);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
    }

    .bot-msg .msg {
      background: var(--bot-msg-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-bottom-left-radius: 4px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    /* Metadata Badge */
    .meta-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      padding: 2px 4px;
    }

    .meta-badge span {
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
    }

    /* Feedback Styling */
    .feedback-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      align-items: center;
    }

    .feedback-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s ease;
    }

    .feedback-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .feedback-btn.active {
      background: rgba(59, 130, 246, 0.15);
      color: var(--primary-color);
      border-color: var(--primary-color);
    }

    /* Input Area */
    .input-area {
      padding: 18px 24px;
      border-top: 1px solid var(--border-color);
      background: rgba(15, 23, 42, 0.4);
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    textarea {
      flex: 1;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      transition: all 0.2s ease;
      height: 48px;
      line-height: 24px;
    }

    textarea:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
      background: rgba(15, 23, 42, 0.8);
    }

    button.send-btn {
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      height: 48px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
    }

    button.send-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    button.send-btn:active {
      transform: translateY(0);
    }

    /* Typing Indicator */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      background: var(--bot-msg-bg);
      border: 1px solid var(--border-color);
      padding: 12px 18px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .dots {
      display: flex;
      gap: 4px;
      align-items: center;
      height: 12px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.3s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    /* Custom Scrollbar */
    .chat-area::-webkit-scrollbar {
      width: 6px;
    }
    .chat-area::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-area::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    .chat-area::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-info">
        <div class="avatar">AI</div>
        <div class="status-container">
          <span class="title">AI Support Agent</span>
          <span class="status">Online</span>
        </div>
      </div>
    </div>
    
    <div class="chat-area" id="chat">
      <div class="msg-wrapper bot-msg">
        <div class="msg">Hello! I am your AI assistant. How can I help you today?</div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div class="typing-indicator" id="typing">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" placeholder="Ask a question..." rows="1"></textarea>
        <button class="send-btn" id="send">Send</button>
      </div>
    </div>
  </div>

  <script>
    let sessionId = localStorage.getItem('session_id') || null;
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const typing = document.getElementById('typing');

    function appendUserMessage(text) {
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper user-msg';
      wrapper.innerHTML = `<div class="msg">${escapeHTML(text)}</div>`;
      chat.appendChild(wrapper);
      scrollToBottom();
    }

    function appendBotMessage(data) {
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper bot-msg';
      
      const msgId = data.message_id;
      const formattedAnswer = data.answer.replace(/\n/g, '<br/>');
      
      let metaInfo = `<span>mode: ${data.mode}</span>`;
      if (data.similarity !== undefined) {
        metaInfo += ` <span>sim: ${data.similarity.toFixed(2)}</span>`;
      }

      wrapper.innerHTML = `
        <div class="msg">${formattedAnswer}</div>
        <div class="meta-badge">${metaInfo}</div>
        <div class="feedback-actions">
          <button class="feedback-btn" onclick="sendFeedback(this, '${msgId}', 1)">
            👍 Helpful
          </button>
          <button class="feedback-btn" onclick="sendFeedback(this, '${msgId}', -1)">
            👎 Unhelpful
          </button>
        </div>
      `;
      chat.appendChild(wrapper);
      scrollToBottom();
    }

    function showTyping() {
      typing.style.display = 'block';
      scrollToBottom();
    }

    function hideTyping() {
      typing.style.display = 'none';
    }

    function scrollToBottom() {
      chat.scrollTop = chat.scrollHeight;
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    async function sendFeedback(btn, messageId, rating) {
      if (btn.classList.contains('active')) return;
      
      // Clear sibling active class if any
      const parent = btn.parentElement;
      const buttons = parent.querySelectorAll('.feedback-btn');
      buttons.forEach(b => b.classList.remove('active'));

      try {
        const response = await fetch('/feedback', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            session_id: sessionId,
            message_id: parseInt(messageId),
            rating: rating
          })
        });
        
        if (response.ok) {
          btn.classList.add('active');
        }
      } catch (err) {
        console.error('Error sending feedback:', err);
      }
    }

    async function send() {
      const message = input.value.trim();
      if (!message) return;

      appendUserMessage(message);
      input.value = '';
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            session_id: sessionId,
            message: message
          })
        });

        const data = await res.json();
        hideTyping();

        if (!sessionId && data.session_id) {
          sessionId = data.session_id;
          localStorage.setItem('session_id', sessionId);
        }

        appendBotMessage(data);
      } catch (err) {
        hideTyping();
        console.error('Error sending message:', err);
        const errWrapper = document.createElement('div');
        errWrapper.className = 'msg-wrapper bot-msg';
        errWrapper.innerHTML = `<div class="msg" style="border-color: #ef4444; color: #f87171;">Sorry, I encountered an error connecting to the server. Please try again.</div>`;
        chat.appendChild(errWrapper);
        scrollToBottom();
      }
    }

    sendBtn.onclick = send;
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // Simple height adjust for textarea
    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
      if (this.scrollHeight > 120) {
        this.style.overflowY = 'auto';
        this.style.height = '120px';
      } else {
        this.style.overflowY = 'hidden';
      }
    });
  </script>
</body>
</html>
